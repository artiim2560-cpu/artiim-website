<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="shortcut icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book a Meeting — Artiim</title>
    <meta name="description"
        content="Schedule a free consultation with Artiim to discuss your AI automation needs." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .booking-header {
            padding: 1.25rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .booking-logo {
            font-family: 'Inter', sans-serif;
            font-size: 1.75rem;
            font-weight: 900;
            color: #fff;
            text-decoration: none;
            letter-spacing: -0.05em;
        }


        .booking-back {
            display: flex;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.2s;
        }

        .booking-back:hover {
            color: #fff;
        }

        /* Main content area */
        .booking-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1.5rem 2rem;
        }

        .booking-heading {
            text-align: center;
            margin-bottom: 2rem;
        }

        .booking-heading h1 {
            font-family: 'Inter', sans-serif;
            font-size: 2.25rem;
            font-weight: 750;
            margin-bottom: 0.75rem;
            letter-spacing: -0.02em;
        }

        .booking-heading p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.05rem;
            max-width: 480px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Calendar embed container */
        .calendar-wrapper {
            width: 100%;
            max-width: 700px;
            background: #0a0a0a;
            border-radius: 1.25rem;
            overflow: hidden;
            box-shadow: 0 25px 80px -12px rgba(0, 0, 0, 0.5);
            min-height: 520px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Footer */
        .booking-footer {
            text-align: center;
            padding: 1.5rem;
            color: rgba(255, 255, 255, 0.25);
            font-size: 0.8rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Decorative background */
        .bg-glow {
            position: fixed;
            top: -30%;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .booking-main,
        .booking-header,
        .booking-footer {
            position: relative;
            z-index: 1;
        }

        /* Trust badges */
        .trust-row {
            display: flex;
            gap: 2rem;
            align-items: center;
            justify-content: center;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .trust-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.8rem;
        }

        .trust-item svg {
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <!-- Background glow -->
    <div class="bg-glow"></div>

    <!-- Header -->
    <header class="booking-header">
        <a href="/" class="booking-logo">Artiim.</a>
        <a href="/" class="booking-back">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5" />
                <polyline points="12 19 5 12 12 5" />
            </svg>
            Back to Home
        </a>
    </header>

    <!-- Main -->
    <main class="booking-main">
        <div class="booking-heading">
            <h1>Schedule a Free Consultation</h1>
            <p>Pick a time that works for you. 
            20 minutes — we map out exactly what we can automate for your business and give you a clear price. No obligation.
            </p>
        </div>

        <!-- Cal.com Inline Embed -->
        <div class="calendar-wrapper" id="cal-embed"></div>

        <!-- Trust signals -->
        <div class="trust-row">
            <div class="trust-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                </svg>
                No commitment required
            </div>
            <div class="trust-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="12 6 12 12 16 14" />
                </svg>
                20-minute session
            </div>
            <div class="trust-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                    <polyline points="22 4 12 14.01 9 11.01" />
                </svg>
                100% Free
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="booking-footer">
        &copy; 2026 Artiim. All rights reserved.
    </footer>

    <!-- Cal.com Inline Embed Script -->
    <script>
        (function (C, A, L) {
            let p = function (a, ar) { a.q.push(ar); };
            let d = C.document;
            C.Cal = C.Cal || function () {
                let cal = C.Cal;
                let ar = arguments;
                if (!cal.loaded) {
                    cal.ns = {};
                    cal.q = cal.q || [];
                    d.head.appendChild(d.createElement("script")).src = A;
                    cal.loaded = true;
                }
                if (ar[0] === L) {
                    const api = function () { p(api, arguments); };
                    const namespace = ar[1];
                    api.q = api.q || [];
                    typeof namespace === "string" ? (cal.ns[namespace] = api) && p(api, ar) : p(cal, ar);
                    return;
                }
                p(cal, ar);
            };
        })(window, "https://app.cal.com/embed/embed.js", "init");

        Cal("init", "booking", { origin: "https://cal.com" });

        Cal.ns.booking("inline", {
            elementOrSelector: "#cal-embed",
            calLink: "artiim-5afvkk/20-minutes-consultation-call",
            layout: "month_view",
            config: {
                theme: "dark"
            }
        });

        Cal.ns.booking("ui", {
            styles: {
                branding: { brandColor: "#ffffff" }
            },
            hideEventTypeDetails: false,
            layout: "month_view"
        });
    </script>
</body>

</html>
